schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
  注释、思考、提问等默认使用中文
  基础语言 GO

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
rules:
  proposal:
    - 默认使用中文撰写 proposal；如需英文，必须由用户明确指定。
    - 设计功能修改，记得同步 README 文档（多语言）
  design:
    - 默认使用中文撰写 design；如需英文，必须由用户明确指定。
  specs:
    - 默认使用中文撰写 specs；如需英文，必须由用户明确指定。
  tasks:
    - 默认使用中文撰写 tasks；如需英文，必须由用户明确指定。
